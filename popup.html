<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 240px;
      padding: 16px;
      font-family: sans-serif;
      text-align: center;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 12px;
    }
    button {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-weight: bold;
      color: #fff;
      background: #E53935;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #C62828;
    }
    .options {
      text-align: left;
      margin-bottom: 12px;
    }
    .options label {
      display: block;
      font-size: 13px;
      padding: 4px 0;
      cursor: pointer;
    }
    .options input[type="checkbox"] {
      margin-right: 6px;
      vertical-align: middle;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>Anti-Asterisk</h1>
  <div class="options">
    <label><input type="checkbox" id="opt-alt" /> alt 属性</label>
    <label><input type="checkbox" id="opt-sources" /> AIのソース表示</label>
    <label><input type="checkbox" id="opt-citations" /> ChatGPTの引用リンク</label>
    <label><input type="checkbox" id="opt-emoji" /> 絵文字も削除</label>
  </div>
  <button id="run">アスタリスクを削除</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
